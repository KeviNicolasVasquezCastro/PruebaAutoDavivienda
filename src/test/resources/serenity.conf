serenity {
  project.name = "Prueba Auto Davivienda"
  take.screenshots = FOR_EACH_ACTION
}

webdriver {
  driver = chrome
  base.url = "TU_URL_AQUI"
}

# 🔥 Importante: En CI se activará con -Dheadless.mode=true
headless.mode = false

# Configuración optimizada para Linux / CI
chrome.switches="--no-sandbox;--disable-dev-shm-usage;--window-size=1920,1080;--ignore-certificate-errors;--remote-allow-origins=*"

# Timeouts recomendados para evitar fallos por lentitud en CI
webdriver.timeouts {
  implicitlywait = 0
  pageLoadTimeout = 300000
}

webdriver.wait.for.timeout = 30000