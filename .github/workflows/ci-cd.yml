name: CI/CD - Serenity BDD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Obtener el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Configurar JDK 17 + Cache Maven
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3️⃣ Instalar Google Chrome (para pruebas UI)
      - name: Install Google Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      # 4️⃣ Ejecutar pruebas con Maven (modo headless recomendado en CI)
      - name: Build and run tests
        run: |
          mvn clean verify -B -Dheadless.mode=true

      # 5️⃣ Subir reportes de Serenity como artefacto
      - name: Upload Serenity Reports
        uses: actions/upload-artifact@v4
        with:
          name: serenity-reports
          path: target/site/serenity