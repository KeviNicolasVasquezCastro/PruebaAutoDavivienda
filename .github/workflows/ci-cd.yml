name: CI/CD - Serenity BDD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 🔥 necesario para publicar en gh-pages

    steps:
      # 1️⃣ Obtener el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Configurar JDK 17 + Cache Maven
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3️⃣ Instalar Google Chrome (para pruebas UI)
      - name: Install Google Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      # 4️⃣ Ejecutar pruebas con Maven (modo headless en CI)
      - name: Build and run tests
        run: mvn clean verify -B -Dheadless.mode=true

      # 5️⃣ Subir reportes de Serenity como artefacto
      - name: Upload Serenity Reports
        uses: actions/upload-artifact@v4
        with:
          name: serenity-reports
          path: target/site/serenity

      # 6️⃣ Publicar reporte en GitHub Pages (solo en push a main)
      - name: Deploy Serenity Report to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/serenity
          publish_branch: gh-pages